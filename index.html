<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- No static favicon: the platform ships none (white-label), and
       `DocumentBranding` injects the tenant's own icon once branding
       resolves. A static link here would flash a wrong/dead icon first. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <!-- The PLATFORM's placeholder, not a tenant's. `TenantBrandingProvider`
         replaces this with the org's own name once `GET /org/branding`
         resolves, so this is only what shows for the first paint and for a
         host that names no tenant. The design branch hardcoded "DevExcel"
         here: that is one customer's name shipped to every other customer's
         tab, which is the whole thing the branding work removes. -->
  <title>Loading</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("admin-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        if (t === "dark") document.documentElement.classList.add("dark");
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
